name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Cross-platform suite — no torch.  The GPU-engine tests are guarded
  # by importorskip and skip here; everything else (wfm, ingest, plot
  # helpers, stats) runs on every OS / Python combination.
  # ------------------------------------------------------------------
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -q

  # ------------------------------------------------------------------
  # Engine job — installs CPU PyTorch so the GPU ABM tests actually
  # execute, and reports coverage.
  # ------------------------------------------------------------------
  engine:
    name: engine + coverage (torch CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Install CPU PyTorch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests with coverage
        run: pytest -q --cov=wings --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
