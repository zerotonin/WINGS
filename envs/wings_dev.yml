# Local development & testing environment (CPU-only).
#   conda env create -f envs/wings_dev.yml
#   conda activate wings-dev
#   pip install -e .          # install WINGS itself (run from the repo root)
#   pytest                    # full suite, including the torch engine tests
#   ruff check .
#
# Note: the editable install is a separate step because a conda YAML runs
# its pip block from the file's own directory (envs/), where there is no
# pyproject.toml — so "-e ." cannot find the package here.

name: wings-dev
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - pandas
  - matplotlib
  - scipy
  - tqdm
  - seaborn
  - pytorch
  - cpuonly
  - pip
  - pip:
      - pytest>=7.0
      - pytest-cov
      - ruff
